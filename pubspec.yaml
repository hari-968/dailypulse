name: dailypulse
description: "DailyPulse - Your daily news & movies companion."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  http: ^1.2.1

  # Images
  cached_network_image: ^3.3.1

  # Local notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Persistence
  shared_preferences: ^2.2.3

  # Links
  url_launcher: ^6.3.1

  # Shimmer effect
  shimmer: ^3.0.0

  # Date formatting
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.1

  # ─── In-App Update System ─────────────────────────────────────────────────
  # HTTP client with download progress support
  dio: ^5.4.3
  # Read current app version from pubspec
  package_info_plus: ^8.0.0
  # Locate device storage paths
  path_provider: ^2.1.3
  # Open/install downloaded APK
  open_filex: ^4.7.0
  # Runtime Android permissions (INSTALL_PACKAGES)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
